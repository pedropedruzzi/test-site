<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definitive IAB Fix</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100dvh;
            background-color: #f3f4f6;
            font-family: -apple-system, sans-serif;
        }

        #root {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
            min-height: 100dvh;
            /* Smoothly animate the layout shift when the keyboard opens */
            transition: padding-bottom 0.2s ease-out;
        }

        /* This class is cleanly toggled by JavaScript ONLY when an input is active */
        .keyboard-active #root {
            padding-bottom: 45vh; 
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
        }

        .spacer {
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-style: italic;
            border: 2px dashed #e5e7eb;
            margin: 20px 0;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="card">
            <strong>Top Content</strong>
            <input type="text" placeholder="Top input...">
        </div>

        <div class="spacer">Viewport Spacer (60vh)</div>

        <div class="card">
            <strong>The Blind-Browser Test</strong>
            <p>When tapped, JS will instantly grant the browser permission to scroll, clearing the floating keyboard.</p>
            <input type="text" placeholder="Tap to test active scroll...">
        </div>
    </div>

    <script>
        // Clean global listeners. No wrapper or individual element bindings required.
        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                document.body.classList.add('keyboard-active');
                
                // Allow the 45vh padding transition to finish, then center the input
                setTimeout(() => {
                    e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 250);
            }
        });

        document.addEventListener('focusout', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                document.body.classList.remove('keyboard-active');
            }
        });
    </script>
</body>
</html>
